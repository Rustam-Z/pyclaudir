services:
  pyclaudir:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persistent data: SQLite, memories, access.json, session_id, cc_logs
      - ./data:/app/data
      # Project-specific system prompt (operator-managed)
      - ./prompts/project.md:/app/prompts/project.md:ro
      # Skill playbooks — bind-mounted read-only so edits are live without
      # a rebuild. The image also has a copy baked in (Dockerfile), this
      # overlays it.
      - ./skills:/app/skills:ro
      # Claude Code auth + session files (pre-authenticate on host first)
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
    working_dir: /app
    # Graceful shutdown: give CC subprocess time to save state
    stop_grace_period: 15s
